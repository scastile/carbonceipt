services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8210:8000"
    volumes:
      - backend-data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
